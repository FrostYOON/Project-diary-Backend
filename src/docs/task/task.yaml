tags:
  - name: Tasks
    description: 태스크 관리 API

paths:
  /api/v1/tasks:
    get:
      summary: 태스크 목록 조회
      tags: [Tasks]
      parameters:
        - in: query
          name: projectId
          schema:
            type: string
            format: objectId
    
    post:
      summary: 태스크 생성
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - startDate
                - endDate
                - status
                - project
                - author
              properties:
                title:
                  type: string
                description:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                status:
                  type: string
                  enum: ['준비', '진행중', '완료', '보류']
                tag:
                  type: string
                project:
                  type: string
                  format: objectId
                author:
                  type: string
                  format: objectId

components:
  schemas:
    Task:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: ['준비', '진행중', '완료', '보류']
        tag:
          type: string
        project:
          type: string
          format: objectId
        author:
          type: string
          format: objectId

  /api/v1/tasks/{id}:
    get:
      summary: 태스크 상세 조회
      tags: [Tasks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    
    put:
      summary: 태스크 수정
      tags: [Tasks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    
    delete:
      summary: 태스크 삭제
      tags: [Tasks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string 