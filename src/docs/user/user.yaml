tags:
  - name: Users
    description: 사용자 관리 API

paths:
  /api/v1/users:
    get:
      summary: 전체 사용자 목록 조회
      tags: [Users]
      responses:
        200:
          description: 사용자 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "사용자 목록 조회 성공"
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        500:
          description: 서버 오류
    
    post:
      summary: 사용자 생성
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - registerType
                - role
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                name:
                  type: string
                phone:
                  type: string
                birth:
                  type: string
                  format: date
                registerType:
                  type: string
                  enum: ['normal', 'google']
                department:
                  type: string
                  format: objectId
                role:
                  type: string
                  enum: ['user', 'manager', 'admin']
                socialId:
                  type: string

  /api/v1/users/{id}:
    get:
      summary: 사용자 상세 정보
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    
    put:
      summary: 사용자 정보 수정
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    
    delete:
      summary: 사용자 삭제
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        name:
          type: string
        phone:
          type: string
        birth:
          type: string
          format: date
        department:
          type: string
          format: objectId
        registerType:
          type: string
          enum: ['normal', 'google']
        role:
          type: string
          enum: ['user', 'manager', 'admin']
        createdAt:
          type: string
        updatedAt:
          type: string 