tags:
  - name: Departments
    description: 부서 관리 API

paths:
  /api/v1/departments:
    get:
      summary: 전체 부서 목록 조회
      tags: [Departments]
      responses:
        200:
          description: 부서 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "부서 목록 조회 성공"
                  data:
                    type: object
                    properties:
                      departments:
                        type: array
                        items:
                          $ref: '#/components/schemas/Department'
        500:
          description: 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "부서 목록 조회 중 오류가 발생했습니다."
    
    post:
      summary: 부서 생성
      tags: [Departments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  enum: ['ceo', 'hr', 'sales', 'marketing', 'design', 'development', 'other']
      responses:
        201:
          description: 부서 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "부서가 생성되었습니다."
                  data:
                    type: object
                    properties:
                      department:
                        $ref: '#/components/schemas/Department'

  /api/v1/departments/{id}:
    get:
      summary: 특정 부서 조회
      tags: [Departments]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 부서 ID
      responses:
        200:
          description: 부서 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "부서 조회 성공"
                  data:
                    type: object
                    properties:
                      department:
                        $ref: '#/components/schemas/Department'
        404:
          description: 부서를 찾을 수 없음
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "해당 부서를 찾을 수 없습니다."
        500:
          description: 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "부서 조회 중 오류가 발생했습니다."
    
    put:
      summary: 부서 정보 수정
      tags: [Departments]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 부서 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  enum: ['ceo', 'hr', 'sales', 'marketing', 'design', 'development', 'other']
      responses:
        200:
          description: 부서 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "부서 정보가 수정되었습니다."
                  data:
                    type: object
                    properties:
                      department:
                        $ref: '#/components/schemas/Department'
    
    delete:
      summary: 부서 삭제
      tags: [Departments]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 부서 ID
      responses:
        200:
          description: 부서 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "부서가 삭제되었습니다."

components:
  schemas:
    Department:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ecb74d5d5e001f5c5e1b"
        name:
          type: string
          enum: ['ceo', 'hr', 'sales', 'marketing', 'design', 'development', 'other']
        code:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time 